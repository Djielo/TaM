# MàJ mensuelle : même génération, publication gh-pages.
name: Simulation — données Open Data (mensuel complet)

on:
  workflow_dispatch:
  schedule:
    - cron: "1 2 1 * *"

permissions:
  contents: write

concurrency:
  group: gh-pages-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Générer simulation_data.json (Urbain + Suburbain)
        run: python scripts/refresh_simulation_opendata.py --avec-suburbain

      - name: Préparer le site statique
        run: |
          set -e
          mkdir -p _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='gtfs_data' \
            --exclude='tam_realtime_api' \
            --exclude='__pycache__' \
            --exclude='_site' \
            --exclude='*.zip' \
            ./ _site/
          test -f _site/simulation_data.json
          rm -f _site/.gitignore

      - name: Publier sur gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
          enable_jekyll: false

